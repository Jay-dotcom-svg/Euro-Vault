<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibir - Euro-Vault</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

    <header class="header">
        <h1 class="logo">Euro-Vault</h1>
        <nav>
            <a href="index.html">Panel</a>
            <a href="#">Transacciones</a>
            <a href="profile.html">Perfil</a>
            <button id="langToggle" style="background: none; border: none; cursor: pointer; font-size: 16px; padding: 10px;">ES</button>
        </nav>
    </header>

    <main class="container">

        <!-- Receive Card -->
        <section class="withdraw-card">
            <h2>Recibir Dinero</h2>

            <form>
                <!-- Your Account -->
                <label>Tu Número de Cuenta</label>
                <input type="text" value="**** **** 2587" readonly>

                <!-- Sender Name -->
                <label>Nombre del Remitente (Opcional)</label>
                <input type="text" placeholder="¿Quién te está enviando dinero?">

                <!-- Expected Amount -->
                <label>Cantidad Esperada (€) (Opcional)</label>
                <input type="number" placeholder="Ingrese la cantidad esperada">

                <!-- Description -->
                <label>Descripción (Opcional)</label>
                <input type="text" placeholder="¿Para qué es?">

                <!-- Button -->
                <button type="submit">Generar Solicitud</button>
            </form>
        </section>

    </main>

    <script>
        const translations = {
            es: {
                panel: 'Panel',
                transacciones: 'Transacciones',
                perfil: 'Perfil',
                titulo: 'Recibir Dinero',
                cuenta: 'Tu Número de Cuenta',
                remitente: 'Nombre del Remitente (Opcional)',
                cantidad: 'Cantidad Esperada (€) (Opcional)',
                descripcion: 'Descripción (Opcional)',
                boton: 'Generar Solicitud'
            },
            en: {
                panel: 'Dashboard',
                transacciones: 'Transactions',
                perfil: 'Profile',
                titulo: 'Receive Money',
                cuenta: 'Your Account Number',
                remitente: 'Sender Name (Optional)',
                cantidad: 'Expected Amount (€) (Optional)',
                descripcion: 'Description (Optional)',
                boton: 'Generate Request'
            }
        };

        let currentLang = localStorage.getItem('appLanguage') || 'es';

        function updateLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLanguage', lang);
            
            document.querySelectorAll('nav a')[0].textContent = translations[lang].panel;
            document.querySelectorAll('nav a')[1].textContent = translations[lang].transacciones;
            document.querySelectorAll('nav a')[2].textContent = translations[lang].perfil;
            
            document.querySelector('.withdraw-card h2').textContent = translations[lang].titulo;
            
            const labels = document.querySelectorAll('label');
            labels[0].textContent = translations[lang].cuenta;
            labels[1].textContent = translations[lang].remitente;
            labels[2].textContent = translations[lang].cantidad;
            labels[3].textContent = translations[lang].descripcion;
            
            document.querySelector('form button').textContent = translations[lang].boton;
            
            document.getElementById('langToggle').textContent = lang === 'es' ? 'EN' : 'ES';
            document.documentElement.lang = lang;
        }

        document.getElementById('langToggle').addEventListener('click', function() {
            const newLang = currentLang === 'es' ? 'en' : 'es';
            updateLanguage(newLang);
        });

        updateLanguage(currentLang);
    </script>

</body>

</html>
