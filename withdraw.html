<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirar - Euro-Vault</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

    <header class="header">
        <h1 class="logo">Euro-Vault</h1>
        <nav>
            <a href="index.html">Panel</a>
            <a href="#">Transacciones</a>
            <a href="profile.html">Perfil</a>
            <button id="langToggle" style="background: none; border: none; cursor: pointer; font-size: 16px; padding: 10px;">ES</button>
        </nav>
    </header>

    <main class="container">

        <!-- Withdraw Card -->
        <section class="withdraw-card">
            <h2>Retirar Fondos</h2>

            <form id="withdrawForm" onsubmit="handleWithdraw(event)">
                <!-- Amount -->
                <label>Cantidad (€)</label>
                <input type="number" placeholder="Ingrese la cantidad" required>

                <!-- Method -->
                <label>Método de Retiro</label>
                <select required>
                <option value="">Seleccione método</option>
                <option>Transferencia Bancaria</option>
                <option>PayPal</option>
                <option>Cartera Crypto</option>
            </select>

                <!-- Account Details -->
                <label>Detalles de la Cuenta</label>
                <input type="text" placeholder="Ingrese información de cuenta/cartera" required>

                <div id="lockMessage" style="color: #d9534f; background-color: #f2dede; border: 1px solid #ebccd1; padding: 12px; border-radius: 4px; margin: 15px 0; display: none;"></div>

                <!-- Button -->
                <button type="submit">Retirar</button>
            </form>
        </section>

    </main>

    <script>
        const translations = {
            es: {
                panel: 'Panel',
                transacciones: 'Transacciones',
                perfil: 'Perfil',
                titulo: 'Retirar Fondos',
                cantidad: 'Cantidad (€)',
                metodo: 'Método de Retiro',
                seleccionar: 'Seleccione método',
                transferencia: 'Transferencia Bancaria',
                detalles: 'Detalles de la Cuenta',
                boton: 'Retirar',
                lockMessage: '⚠️ Los fondos están bloqueados y no se pueden retirar en este momento. Volverán a estar disponibles el 30 de junio de 2026.'
            },
            en: {
                panel: 'Dashboard',
                transacciones: 'Transactions',
                perfil: 'Profile',
                titulo: 'Withdraw Funds',
                cantidad: 'Amount (€)',
                metodo: 'Withdrawal Method',
                seleccionar: 'Select method',
                transferencia: 'Bank Transfer',
                detalles: 'Account Details',
                boton: 'Withdraw',
                lockMessage: '⚠️ Funds are locked and cannot be withdrawn at this time. They will be available again on June 30, 2026.'
            }
        };

        let currentLang = localStorage.getItem('appLanguage') || 'es';

        function updateLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLanguage', lang);
            
            document.querySelectorAll('nav a')[0].textContent = translations[lang].panel;
            document.querySelectorAll('nav a')[1].textContent = translations[lang].transacciones;
            document.querySelectorAll('nav a')[2].textContent = translations[lang].perfil;
            
            document.querySelector('.withdraw-card h2').textContent = translations[lang].titulo;
            
            const labels = document.querySelectorAll('label');
            labels[0].textContent = translations[lang].cantidad;
            labels[1].textContent = translations[lang].metodo;
            labels[2].textContent = translations[lang].detalles;
            
            document.querySelector('select option').textContent = translations[lang].seleccionar;
            document.querySelector('form button').textContent = translations[lang].boton;
            
            document.getElementById('langToggle').textContent = lang === 'es' ? 'EN' : 'ES';
            document.documentElement.lang = lang;
        }

        document.getElementById('langToggle').addEventListener('click', function() {
            const newLang = currentLang === 'es' ? 'en' : 'es';
            updateLanguage(newLang);
        });

        updateLanguage(currentLang);

        function handleWithdraw(event) {
            event.preventDefault();
            
            const lockMessage = document.getElementById('lockMessage');
            lockMessage.textContent = translations[currentLang].lockMessage;
            lockMessage.style.display = 'block';
        }
    </script>

</body>

</html>
