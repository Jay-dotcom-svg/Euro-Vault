<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar - Euro-Vault</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

    <header class="header">
        <h1 class="logo">Euro-Vault</h1>
        <nav>
            <a href="index.html">Panel</a>
            <a href="#">Transacciones</a>
            <a href="profile.html">Perfil</a>
            <button id="langToggle" style="background: none; border: none; cursor: pointer; font-size: 16px; padding: 10px;">ES</button>
        </nav>
    </header>

    <main class="container">

        <!-- Send Card -->
        <section class="withdraw-card">
            <h2>Enviar Dinero</h2>

            <form id="sendForm" onsubmit="handleSend(event)">
                <!-- Recipient -->
                <label>Nombre del Destinatario</label>
                <input type="text" placeholder="Ingrese el nombre del destinatario" required>

                <!-- Recipient Account -->
                <label>Número de Cuenta del Destinatario</label>
                <input type="text" placeholder="Ingrese el número de cuenta" required>

                <!-- Amount -->
                <label>Cantidad (€)</label>
                <input type="number" placeholder="Ingrese la cantidad" required>

                <!-- Description -->
                <label>Descripción (Opcional)</label>
                <input type="text" placeholder="¿Para qué es esta transferencia?">

                <div id="lockMessage" style="color: #d9534f; background-color: #f2dede; border: 1px solid #ebccd1; padding: 12px; border-radius: 4px; margin: 15px 0; display: none;"></div>

                <!-- Button -->
                <button type="submit">Enviar Dinero</button>
            </form>
        </section>

    </main>

    <script>
        const translations = {
            es: {
                panel: 'Panel',
                transacciones: 'Transacciones',
                perfil: 'Perfil',
                titulo: 'Enviar Dinero',
                destinatario: 'Nombre del Destinatario',
                cuenta: 'Número de Cuenta del Destinatario',
                cantidad: 'Cantidad (€)',
                descripcion: 'Descripción (Opcional)',
                boton: 'Enviar Dinero',
                lockMessage: '⚠️ Los fondos están bloqueados y no se pueden enviar en este momento. Volverán a estar disponibles el 30 de junio de 2026.'
            },
            en: {
                panel: 'Dashboard',
                transacciones: 'Transactions',
                perfil: 'Profile',
                titulo: 'Send Money',
                destinatario: 'Recipient Name',
                cuenta: 'Recipient Account Number',
                cantidad: 'Amount (€)',
                descripcion: 'Description (Optional)',
                boton: 'Send Money',
                lockMessage: '⚠️ Funds are locked and cannot be sent at this time. They will be available again on June 30, 2026.'
            }
        };

        let currentLang = localStorage.getItem('appLanguage') || 'es';

        function updateLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLanguage', lang);
            
            document.querySelectorAll('nav a')[0].textContent = translations[lang].panel;
            document.querySelectorAll('nav a')[1].textContent = translations[lang].transacciones;
            document.querySelectorAll('nav a')[2].textContent = translations[lang].perfil;
            
            document.querySelector('.withdraw-card h2').textContent = translations[lang].titulo;
            
            const labels = document.querySelectorAll('label');
            labels[0].textContent = translations[lang].destinatario;
            labels[1].textContent = translations[lang].cuenta;
            labels[2].textContent = translations[lang].cantidad;
            labels[3].textContent = translations[lang].descripcion;
            
            document.querySelector('form button').textContent = translations[lang].boton;
            
            document.getElementById('langToggle').textContent = lang === 'es' ? 'EN' : 'ES';
            document.documentElement.lang = lang;
        }

        document.getElementById('langToggle').addEventListener('click', function() {
            const newLang = currentLang === 'es' ? 'en' : 'es';
            updateLanguage(newLang);
        });

        updateLanguage(currentLang);

        function handleSend(event) {
            event.preventDefault();
            
            const lockMessage = document.getElementById('lockMessage');
            lockMessage.textContent = translations[currentLang].lockMessage;
            lockMessage.style.display = 'block';
        }
    </script>

</body>

</html>
