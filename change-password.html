<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Euro-Vault</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

    <header class="header">
        <h1 class="logo">Euro-Vault</h1>
        <nav>
            <a href="index.html">Panel</a>
            <a href="#">Transacciones</a>
            <a href="profile.html">Perfil</a>
            <button id="langToggle" style="background: none; border: none; cursor: pointer; font-size: 16px; padding: 10px;">ES</button>
        </nav>
    </header>

    <main class="container">

        <!-- Change Password Card -->
        <section class="withdraw-card">
            <h2>Cambiar Contraseña</h2>

            <form id="changePasswordForm" onsubmit="handleChangePassword(event)">
                <!-- Current Password -->
                <label>Contraseña Actual</label>
                <input type="password" id="currentPassword" name="currentPassword" placeholder="Ingrese su contraseña actual" required>

                <!-- New Password -->
                <label>Nueva Contraseña</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Ingrese la nueva contraseña" required>

                <!-- Confirm New Password -->
                <label>Confirmar Nueva Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme la nueva contraseña" required>

                <div id="errorMessage" style="color: red; margin-bottom: 10px; display: none;"></div>
                <div id="successMessage" style="color: green; margin-bottom: 10px; display: none;"></div>

                <!-- Button -->
                <button type="submit">Cambiar Contraseña</button>
                <button type="button" onclick="window.location.href='profile.html'" style="background-color: #ccc; color: #000;">Cancelar</button>
            </form>
        </section>

    </main>

    <script>
        function handleChangePassword(event) {
            event.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            const correctPassword = 'Lucy960$$';
            
            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Check if current password is correct
            if (currentPassword !== correctPassword) {
                errorMessage.textContent = 'La contraseña actual es incorrecta.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Check if new password and confirm password match
            if (newPassword !== confirmPassword) {
                errorMessage.textContent = 'Las nuevas contraseñas no coinciden.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Check if new password is not the same as current password
            if (newPassword === currentPassword) {
                errorMessage.textContent = 'La nueva contraseña no puede ser igual a la contraseña actual.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Check minimum password length
            if (newPassword.length < 6) {
                errorMessage.textContent = 'La nueva contraseña debe tener al menos 6 caracteres.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Password change successful
            successMessage.textContent = '¡Contraseña cambiada exitosamente! Redirigiendo al perfil...';
            successMessage.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 2000);
        }

        // Language translations
        const translations = {
            es: {
                panel: 'Panel',
                transacciones: 'Transacciones',
                perfil: 'Perfil',
                titulo: 'Cambiar Contraseña',
                actual: 'Contraseña Actual',
                nueva: 'Nueva Contraseña',
                confirmar: 'Confirmar Nueva Contraseña',
                cambiar: 'Cambiar Contraseña',
                cancelar: 'Cancelar',
                actualIncorrecto: 'La contraseña actual es incorrecta.',
                noCoinciden: 'Las nuevas contraseñas no coinciden.',
                mismaActual: 'La nueva contraseña no puede ser igual a la contraseña actual.',
                minimo: 'La nueva contraseña debe tener al menos 6 caracteres.',
                exito: '¡Contraseña cambiada exitosamente! Redirigiendo al perfil...'
            },
            en: {
                panel: 'Dashboard',
                transacciones: 'Transactions',
                perfil: 'Profile',
                titulo: 'Change Password',
                actual: 'Current Password',
                nueva: 'New Password',
                confirmar: 'Confirm New Password',
                cambiar: 'Change Password',
                cancelar: 'Cancel',
                actualIncorrecto: 'Current password is incorrect.',
                noCoinciden: 'New passwords do not match.',
                mismaActual: 'New password cannot be the same as current password.',
                minimo: 'New password must be at least 6 characters long.',
                exito: 'Password changed successfully! Redirecting to profile...'
            }
        };

        let currentLang2 = localStorage.getItem('appLanguage') || 'es';

        function updateLanguage2(lang) {
            currentLang2 = lang;
            localStorage.setItem('appLanguage', lang);
            
            document.querySelectorAll('nav a')[0].textContent = translations[lang].panel;
            document.querySelectorAll('nav a')[1].textContent = translations[lang].transacciones;
            document.querySelectorAll('nav a')[2].textContent = translations[lang].perfil;
            
            document.querySelector('.withdraw-card h2').textContent = translations[lang].titulo;
            
            const labels = document.querySelectorAll('label');
            labels[0].textContent = translations[lang].actual;
            labels[1].textContent = translations[lang].nueva;
            labels[2].textContent = translations[lang].confirmar;
            
            const buttons = document.querySelectorAll('.withdraw-card button');
            buttons[0].textContent = translations[lang].cambiar;
            buttons[1].textContent = translations[lang].cancelar;
            
            document.getElementById('langToggle').textContent = lang === 'es' ? 'EN' : 'ES';
            document.documentElement.lang = lang;
        }

        document.getElementById('langToggle').addEventListener('click', function() {
            const newLang = currentLang2 === 'es' ? 'en' : 'es';
            updateLanguage2(newLang);
        });

        updateLanguage2(currentLang2);
    </script>

</body>

</html>
